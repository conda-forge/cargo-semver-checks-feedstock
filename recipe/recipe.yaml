context:
  version: "0.49.0"

package:
  name: cargo-semver-checks
  version: ${{ version }}

source:
  url: https://github.com/obi1kenobi/cargo-semver-checks/archive/refs/tags/v${{ version }}.tar.gz
  sha256: e8336ca5ba0b7392abcafd2ae3cdf243570e485eeb5a97ed28815afb5bce0c1c

build:
  number: 0
  script:
    interpreter: brush
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content: |
      cargo auditable install --locked --no-track --bins --root "${LIBRARY_PREFIX:-$PREFIX}" --path .
      cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable
    - brush

tests:
  - script: cargo-semver-checks --help
  - package_contents:
      bin:
        - cargo-semver-checks
      strict: true

about:
  homepage: https://github.com/obi1kenobi/cargo-semver-checks
  summary: Scan your Rust crate for semver violations.
  description: |
    cargo-semver-checks is a linter for library crates. It compares
    two builds of the same crate and reports any breaking API changes
    that would require a semver-major version bump, helping catch
    accidental breaking changes before publishing.
  license: MIT OR Apache-2.0
  license_file:
    - LICENSE-APACHE
    - LICENSE-MIT
    - THIRDPARTY.yml
  documentation: https://docs.rs/cargo-semver-checks
  repository: https://github.com/obi1kenobi/cargo-semver-checks

extra:
  recipe-maintainers:
    - baszalmstra
